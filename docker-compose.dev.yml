# Zenith Admin — 本地开发基础设施
#
# 仅启动 PostgreSQL 和 Redis，供本地 `npm run dev` 使用。
# 不会构建 Node.js / Nginx 镜像。
#
# 用法：
#   docker compose -f docker-compose.dev.yml up -d
#   npm run dev
#
name: zenith-admin-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: zenith-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zenith_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zenith_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zenith-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
